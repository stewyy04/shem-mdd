<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Схемы IN PRO">
<link rel="manifest" href="manifest.webmanifest">
<title>Схемы IN PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#f2f2f7;--panel:#fff;--accent:#007aff;--text:#1c1c1e;--muted:#6e6e73;--line:#e5e5ea;--green:#34c759;--red:#ff3b30}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:max(14px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%;overscroll-behavior:none}.header{max-width:1680px;margin:0 auto 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}h1{margin:0;font-size:24px;font-weight:750;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.container{max-width:1680px;margin:0 auto;display:grid;grid-template-columns:minmax(330px,400px) minmax(0,1fr);gap:16px;min-height:calc(100vh - 76px)}.controls,.canvas-wrap{background:var(--panel);border:1px solid rgba(0,0,0,.04);border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.06)}.controls{padding:18px;overflow:auto;max-height:calc(100vh - 92px);-webkit-overflow-scrolling:touch}.section{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--line)}.section:last-child{border-bottom:0;margin-bottom:0}h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}.group{background:#f8f8fb;border:1px solid #eeeef3;border-radius:10px;padding:12px;margin-bottom:10px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.row:last-child{margin-bottom:0}label{font-size:13px;font-weight:650;color:#3a3a3c}input{font:inherit}input[type=number]{width:72px;min-height:38px;padding:6px 8px;border:1px solid #d1d1d6;border-radius:8px;text-align:center;background:#fff}input[type=text]{width:100%;min-height:38px;padding:7px 9px;border:1px solid #d1d1d6;border-radius:8px;background:#fff;font-size:14px}.angle-row{display:grid;grid-template-columns:1fr 72px;gap:10px;align-items:center}.angle-label{min-height:38px;display:flex;align-items:center;color:var(--muted);font-size:13px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;width:100%;margin-bottom:10px;padding:10px 16px;border:0;border-radius:10px;font-size:14px;font-weight:750;cursor:pointer;touch-action:manipulation}.primary{background:var(--accent);color:#fff}.success{background:var(--green);color:#fff}.secondary{background:#e5e5ea;color:var(--text)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 10px}.check{display:flex;align-items:center;gap:8px;min-height:34px;font-size:14px;user-select:none}.check input{width:22px;height:22px;accent-color:var(--accent);flex:0 0 auto}.canvas-wrap{position:relative;min-height:520px;padding:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}.canvas-wrap.dragging{cursor:grabbing}canvas{display:block;width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;touch-action:none;cursor:crosshair}@media(max-width:860px){body{padding:max(8px,env(safe-area-inset-top)) 8px max(10px,env(safe-area-inset-bottom))}.header{position:sticky;top:0;z-index:3;margin-bottom:8px;padding:8px 0;background:var(--bg)}h1{font-size:18px;max-width:calc(100vw - 120px)}.header .btn{width:auto;min-width:96px;margin:0;padding-inline:12px}.container{grid-template-columns:1fr;gap:10px;min-height:0}.canvas-wrap{order:-1;height:58vh;min-height:355px;max-height:620px;padding:6px;border-radius:12px}.controls{max-height:none;padding:14px;border-radius:12px}.section{margin-bottom:14px;padding-bottom:14px}.grid{grid-template-columns:1fr}.angle-row{grid-template-columns:1fr 68px}}
</style>
</head>
<body>
<div class="header"><h1>Схемы IN PRO</h1><button id="save" class="btn success">PNG</button></div>
<div class="container">
  <div class="controls">
    <div class="section"><h3>Конфигурация</h3><div class="row"><label for="count">Кол-во дорог</label><input id="count" type="number" min="2" max="8" value="3"></div><button id="rebuild" class="btn primary">Перестроить</button></div>
    <div class="section"><h3>Направления</h3><div id="angles"></div></div>
    <div class="section"><h3>Переходы</h3><div id="crosses" class="grid"></div></div>
    <button id="reset" class="btn secondary">Сбросить</button>
  </div>
  <div class="canvas-wrap" id="canvasWrap"><canvas id="c" width="1400" height="1100"></canvas></div>
</div>
<script>
const CFG={roadWidth:160,roadLength:450,nodeRadius:28,centerRadius:92,road:'#4a4a4a',mark:'#fff',arrow:'#ff3b30',arrowSoft:'rgba(255,59,48,.15)',cx:700,cy:550,crosswalkDist:170,stopLineDist:210,streetFont:26,crossFont:18};
let dirs=[],moves=[],crosses=[],count=3,canvas,ctx,wrap,drag=null,arrowShapes=[];
addEventListener('load',()=>{canvas=by('c');ctx=canvas.getContext('2d');wrap=by('canvasWrap');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand();if(tg.themeParams&&tg.themeParams.bg_color)document.documentElement.style.setProperty('--bg',tg.themeParams.bg_color)}if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{});by('rebuild').addEventListener('click',init);by('reset').addEventListener('click',()=>{by('count').value=3;init()});by('save').addEventListener('click',save);by('count').addEventListener('change',init);canvas.addEventListener('pointerdown',pointerDown);canvas.addEventListener('pointermove',pointerMove);canvas.addEventListener('pointerup',pointerUp);canvas.addEventListener('pointercancel',pointerUp);init()});
function by(id){return document.getElementById(id)}
function save(){const a=document.createElement('a');a.download='scheme-in-pro.png';a.href=canvas.toDataURL('image/png');a.click()}
function init(){count=clamp(parseInt(by('count').value,10)||3,2,8);by('count').value=count;dirs=[];moves=[];crosses=[];let a=[];if(count===3)a=[160,285,15];else if(count===4)a=[0,90,180,270];else for(let i=0;i<count;i++)a.push(Math.round(i*360/count));for(let i=0;i<count;i++){dirs.push({id:i+1,angle:a[i],name:`Напр. ${i+1}`});crosses.push({direction:i+1,active:false});for(let j=0;j<count;j++)if(i!==j)moves.push({from:i+1,to:j+1,active:false})}if(count===3){setMove(1,2);setMove(1,3);setMove(3,2);setMove(3,1)}controls();draw()}
function setMove(f,t){const m=moves.find(x=>x.from===f&&x.to===t);if(m)m.active=true}
function controls(){angles();checks('crosses',crosses,c=>`ПП ${c.direction}`,(c,v)=>{crosses[crosses.indexOf(c)].active=v;draw()})}
function angles(){const box=by('angles');box.innerHTML='';dirs.forEach((d,i)=>{const g=document.createElement('div');g.className='group';g.innerHTML=`<div class="row"><label for="name-${d.id}">Направление ${d.id}</label></div><input id="name-${d.id}" class="name" type="text" value="${esc(d.name)}"><div class="angle-row" style="margin-top:10px"><div class="angle-label">Угол</div><input class="num" type="number" min="0" max="359" value="${d.angle}"></div>`;const n=g.querySelector('.num'),name=g.querySelector('.name');n.addEventListener('change',e=>{dirs[i].angle=norm(parseInt(e.target.value,10));e.target.value=dirs[i].angle;draw()});name.addEventListener('input',e=>{dirs[i].name=e.target.value;draw()});box.appendChild(g)})}
function syncAngleInputs(){document.querySelectorAll('#angles .group').forEach((g,i)=>{const n=g.querySelector('.num');if(n&&dirs[i])n.value=Math.round(dirs[i].angle)})}
function checks(id,items,label,change){const box=by(id);box.innerHTML='';items.forEach(item=>{const d=document.createElement('div');d.className='check';const c=document.createElement('input');c.type='checkbox';c.checked=item.active;c.addEventListener('change',()=>change(item,c.checked));const l=document.createElement('label');l.textContent=label(item);l.style.cursor='pointer';l.addEventListener('click',()=>c.click());d.append(c,l);box.appendChild(d)})}
function draw(){arrowShapes=[];ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);roads();marks();crosswalks();moves.forEach(m=>{if(!m.active)arrow(m,false)});moves.forEach(m=>{if(m.active)arrow(m,true)});nodes()}
function roads(){ctx.fillStyle=CFG.road;ctx.beginPath();ctx.arc(CFG.cx,CFG.cy,CFG.roadWidth*.6,0,Math.PI*2);ctx.fill();dirs.forEach(d=>{const v=vec(d.angle);ctx.beginPath();ctx.moveTo(CFG.cx,CFG.cy);ctx.lineTo(CFG.cx+v.x*CFG.roadLength,CFG.cy+v.y*CFG.roadLength);ctx.strokeStyle=CFG.road;ctx.lineWidth=CFG.roadWidth;ctx.lineCap='butt';ctx.stroke()})}
function marks(){dirs.forEach(d=>{const v=vec(d.angle),p={x:-v.y,y:v.x},s=roadPoint(v,CFG.stopLineDist),e=roadPoint(v,CFG.roadLength);ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=CFG.mark;ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-p.x*(CFG.roadWidth/2-5),s.y-p.y*(CFG.roadWidth/2-5));ctx.lineWidth=4;ctx.stroke()})}
function arrow(data,active){const f=dirs.find(d=>d.id===data.from),t=dirs.find(d=>d.id===data.to);if(!f||!t)return;const fv=vec(f.angle),tv=vec(t.angle),incoming={x:-fv.x,y:-fv.y},out=tv,rin=cw(incoming),rout=cw(out),turn=turnCat(f,t),startRatio=turn<0?.18:turn>0?.74:.46,endRatio=turn<0?.28:turn>0?.70:.46,startShift=CFG.roadWidth/2*startRatio,endShift=CFG.roadWidth/2*endRatio,start=add(roadPoint(fv,CFG.roadLength-58),scale(rin,startShift)),end=add(roadPoint(tv,CFG.roadLength-58),scale(rout,endShift)),cs=add(roadPoint(fv,CFG.centerRadius+64),scale(rin,startShift)),ce=add(roadPoint(tv,CFG.centerRadius+64),scale(rout,endShift)),h1=add(start,scale(incoming,Math.min(230,dist(start,cs)*.76))),h2=add(end,scale(out,-Math.min(230,dist(end,ce)*.76))),color=active?CFG.arrow:CFG.arrowSoft;ctx.beginPath();ctx.moveTo(start.x,start.y);ctx.bezierCurveTo(h1.x,h1.y,h2.x,h2.y,end.x,end.y);ctx.strokeStyle=color;ctx.lineWidth=active?6:4;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();head(end.x,end.y,unit(sub(end,h2)),color,active);arrowShapes.push({move:data,start,h1,h2,end});if(active)moveLabel(`${data.from}${data.to}`,start,incoming)}
function moveLabel(text,start,dir){const p=add(start,scale(dir,26));ctx.save();ctx.font='bold 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';const w=ctx.measureText(text).width+12;ctx.fillStyle='rgba(255,255,255,.92)';rr(p.x-w/2,p.y-10,w,20,5,true,false);ctx.fillStyle='#1c1c1e';ctx.fillText(text,p.x,p.y+.5);ctx.restore()}
function head(x,y,d,color,active){const s=active?19:14,a=Math.atan2(d.y,d.x),sp=Math.PI/7;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-s*Math.cos(a-sp),y-s*Math.sin(a-sp));ctx.lineTo(x-s*Math.cos(a+sp),y-s*Math.sin(a+sp));ctx.closePath();ctx.fillStyle=color;ctx.fill()}
function crosswalks(){dirs.forEach(d=>{const c=crosses.find(x=>x.direction===d.id);if(!c||!c.active)return;const v=vec(d.angle),p={x:-v.y,y:v.x},center=roadPoint(v,CFG.crosswalkDist),stripes=14,step=(CFG.roadWidth-15)/stripes;ctx.strokeStyle='#fff';ctx.lineWidth=3;for(let i=0;i<stripes;i++){const off=(i-(stripes-1)/2)*step,s=add(center,scale(p,off));ctx.beginPath();ctx.moveTo(s.x-v.x*10,s.y-v.y*10);ctx.lineTo(s.x+v.x*10,s.y+v.y*10);ctx.stroke()}const label=add(add(center,scale(v,54)),scale(p,-(CFG.roadWidth/2+38)));badge(`П.${d.id}`,label.x,label.y,CFG.crossFont)})}
function nodes(){dirs.forEach(d=>{const v=vec(d.angle),n=roadPoint(v,CFG.roadLength+45);ctx.beginPath();ctx.arc(n.x,n.y,CFG.nodeRadius,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#000';ctx.font='bold 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.id,n.x,n.y);street(d,v)})}
function street(d,v){if(!d.name||!d.name.trim())return;const p={x:-v.y,y:v.x},base=roadPoint(v,CFG.roadLength/2+72),pt=clampPoint(add(base,scale(p,CFG.roadWidth/2+72)),90),angle=d.angle>90&&d.angle<270?rad(d.angle)+Math.PI:rad(d.angle);ctx.save();ctx.translate(pt.x,pt.y);ctx.rotate(angle);ctx.font=`bold ${CFG.streetFont}px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial`;ctx.textAlign='center';ctx.textBaseline='middle';const measured=ctx.measureText(d.name).width,w=Math.min(measured,360)+26,h=CFG.streetFont+16;ctx.fillStyle='rgba(255,255,255,.96)';rr(-w/2,-h/2,w,h,7,true,false);ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=1;rr(-w/2,-h/2,w,h,7,false,true);ctx.fillStyle='#111';fitText(d.name,0,1,w-18,CFG.streetFont);ctx.restore()}
function badge(text,x,y,size){ctx.save();ctx.font=`bold ${size}px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial`;ctx.textAlign='center';ctx.textBaseline='middle';const w=ctx.measureText(text).width+18,h=size+12;ctx.fillStyle='rgba(255,255,255,.94)';rr(x-w/2,y-h/2,w,h,6,true,false);ctx.strokeStyle='rgba(0,0,0,.18)';rr(x-w/2,y-h/2,w,h,6,false,true);ctx.fillStyle='#000';ctx.fillText(text,x,y+.5);ctx.restore()}
function pointerDown(e){const p=canvasPoint(e),road=hitRoad(p);if(road){drag={dir:road,start:p,moved:false};canvas.setPointerCapture(e.pointerId);wrap.classList.add('dragging');e.preventDefault();return}const shape=hitArrow(p);if(shape){shape.move.active=!shape.move.active;draw();e.preventDefault()}}
function pointerMove(e){if(!drag)return;const p=canvasPoint(e),dx=p.x-drag.start.x,dy=p.y-drag.start.y;if(Math.hypot(dx,dy)>3)drag.moved=true;drag.dir.angle=norm(Math.round(Math.atan2(p.y-CFG.cy,p.x-CFG.cx)*180/Math.PI));syncAngleInputs();draw();e.preventDefault()}
function pointerUp(e){if(drag){drag=null;wrap.classList.remove('dragging');try{canvas.releasePointerCapture(e.pointerId)}catch(_){}}}
function canvasPoint(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
function hitRoad(p){let best=null,bestScore=Infinity;dirs.forEach(d=>{const v=vec(d.angle),a={x:CFG.cx,y:CFG.cy},b=roadPoint(v,CFG.roadLength+45),node=roadPoint(v,CFG.roadLength+45),nodeDist=dist(p,node),seg=distToSegment(p,a,b);let score=Math.min(nodeDist,seg);if(score<bestScore){bestScore=score;best=d}});return bestScore<44?best:null}
function hitArrow(p){let best=null,bestDist=Infinity;arrowShapes.forEach(s=>{for(let i=0;i<=36;i++){const q=bezier(s.start,s.h1,s.h2,s.end,i/36),d=dist(p,q);if(d<bestDist){bestDist=d;best=s}}});return bestDist<24?best:null}
function bezier(a,b,c,d,t){const mt=1-t;return{x:mt*mt*mt*a.x+3*mt*mt*t*b.x+3*mt*t*t*c.x+t*t*t*d.x,y:mt*mt*mt*a.y+3*mt*mt*t*b.y+3*mt*t*t*c.y+t*t*t*d.y}}
function distToSegment(p,a,b){const ab=sub(b,a),ap=sub(p,a),l2=ab.x*ab.x+ab.y*ab.y||1,t=clamp((ap.x*ab.x+ap.y*ab.y)/l2,0,1),q=add(a,scale(ab,t));return dist(p,q)}
function fitText(text,x,y,max,base){let s=base;while(s>14){ctx.font=`bold ${s}px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial`;if(ctx.measureText(text).width<=max)break;s--}ctx.fillText(text,x,y)}
function turnCat(f,t){const incoming=scale(vec(f.angle),-1),out=vec(t.angle),cross=incoming.x*out.y-incoming.y*out.x,dot=incoming.x*out.x+incoming.y*out.y,angle=Math.atan2(cross,dot)*180/Math.PI;if(Math.abs(angle)<25)return 0;return angle<0?-1:1}
function roadPoint(v,d){return{x:CFG.cx+v.x*d,y:CFG.cy+v.y*d}}
function vec(deg){return{x:Math.cos(rad(deg)),y:Math.sin(rad(deg))}}
function rad(d){return d*Math.PI/180}
function norm(v){return((Number.isFinite(v)?v:0)%360+360)%360}
function cw(v){return{x:v.y,y:-v.x}}
function add(a,b){return{x:a.x+b.x,y:a.y+b.y}}
function sub(a,b){return{x:a.x-b.x,y:a.y-b.y}}
function scale(v,f){return{x:v.x*f,y:v.y*f}}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function unit(v){const l=Math.hypot(v.x,v.y)||1;return{x:v.x/l,y:v.y/l}}
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function clampPoint(p,m){return{x:clamp(p.x,m,canvas.width-m),y:clamp(p.y,m,canvas.height-m)}}
function rr(x,y,w,h,r,fill,stroke){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke()}
function esc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
</script>
</body>
</html>
