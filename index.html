<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Схемы IN PRO">
<link rel="manifest" href="manifest.webmanifest">
<title>Схемы IN PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#f2f2f7;--panel:#fff;--text:#1c1c1e;--muted:#6e6e73;--line:#e5e5ea;--blue:#007aff;--green:#34c759}*{box-sizing:border-box}html,body{margin:0;min-height:100%;overscroll-behavior:none}body{min-height:100vh;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%;user-select:none}.top{max-width:1680px;margin:0 auto 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}.title{min-width:0;font-size:22px;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border:0;border-radius:10px;padding:10px 16px;font:inherit;font-weight:760;cursor:pointer;touch-action:manipulation}.save{background:var(--green);color:#fff}.app{max-width:1680px;margin:0 auto;display:grid;grid-template-columns:minmax(320px,390px) minmax(0,1fr);gap:14px}.panel,.stage{background:var(--panel);border:1px solid rgba(0,0,0,.05);border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.06)}.panel{padding:16px;max-height:calc(100vh - 78px);overflow:auto;-webkit-overflow-scrolling:touch}.section{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--line)}.section:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}h3{margin:0 0 12px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.row:last-child{margin-bottom:0}label{font-size:13px;font-weight:650;color:#3a3a3c}input{font:inherit}input[type=number]{width:72px;min-height:38px;padding:6px 8px;border:1px solid #d1d1d6;border-radius:8px;text-align:center;background:#fff}input[type=text]{width:100%;min-height:38px;border:1px solid #d1d1d6;border-radius:8px;padding:7px 9px;background:#fff}.group{padding:12px;margin-bottom:10px;background:#f8f8fb;border:1px solid #eeeef3;border-radius:10px}.primary{width:100%;background:var(--blue);color:#fff;margin-top:2px}.secondary{width:100%;background:#e5e5ea;color:var(--text)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 10px}.check{display:flex;align-items:center;gap:8px;min-height:34px}.check input{width:22px;height:22px;accent-color:var(--blue)}.stage{height:calc(100vh - 78px);min-height:560px;padding:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{width:100%;height:100%;display:block;object-fit:contain;touch-action:none;cursor:crosshair}@media(max-width:860px){body{padding:max(8px,env(safe-area-inset-top)) 8px max(10px,env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:5;padding:7px 0;margin-bottom:8px;background:var(--bg)}.title{font-size:18px;max-width:calc(100vw - 116px)}.save{min-width:96px}.app{grid-template-columns:1fr;gap:10px}.stage{order:-1;height:60vh;min-height:360px;max-height:650px;padding:5px;border-radius:12px}.panel{max-height:none;padding:14px;border-radius:12px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="title">Схемы IN PRO</div><button class="btn save" id="save">PNG</button></header>
<main class="app">
  <aside class="panel">
    <section class="section"><h3>Конфигурация</h3><div class="row"><label for="count">Кол-во дорог</label><input id="count" type="number" min="2" max="8" value="3"></div><button class="btn primary" id="rebuild">Перестроить</button></section>
    <section class="section"><h3>Направления</h3><div id="dirControls"></div></section>
    <section class="section"><h3>Переходы</h3><div class="grid" id="crossControls"></div></section>
    <button class="btn secondary" id="reset">Сбросить</button>
  </aside>
  <section class="stage"><canvas id="scheme" width="1600" height="1200"></canvas></section>
</main>
<script>
const CFG={cx:800,cy:600,roadWidth:170,roadLength:510,centerRadius:126,nodeRadius:28,laneInset:0.25,road:'#444',mark:'#fff',red:'#ff2d20',soft:'rgba(255,45,32,.13)',text:'#111'};
let canvas,ctx,dirs=[],moves=[],crosses=[],count=3,drag=null,arrowHits=[];
addEventListener('load',()=>{canvas=id('scheme');ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand();if(tg.themeParams&&tg.themeParams.bg_color)document.documentElement.style.setProperty('--bg',tg.themeParams.bg_color)}if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{});id('save').onclick=savePng;id('rebuild').onclick=init;id('reset').onclick=()=>{id('count').value=3;init()};id('count').onchange=init;canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);init()});
function id(v){return document.getElementById(v)}
function init(){count=clamp(parseInt(id('count').value,10)||3,2,8);id('count').value=count;dirs=[];moves=[];crosses=[];let angles=[];if(count===3)angles=[160,285,15];else if(count===4)angles=[0,90,180,270];else for(let i=0;i<count;i++)angles.push(Math.round(i*360/count));for(let i=0;i<count;i++){dirs.push({id:i+1,angle:angles[i],name:`Напр. ${i+1}`});crosses.push({dir:i+1,active:false});for(let j=0;j<count;j++)if(i!==j)moves.push({from:i+1,to:j+1,active:false})}if(count===3){activate(1,2);activate(1,3);activate(3,2);activate(3,1)}renderControls();draw()}
function activate(f,t){const m=moves.find(x=>x.from===f&&x.to===t);if(m)m.active=true}
function renderControls(){const dc=id('dirControls');dc.innerHTML='';dirs.forEach((d,i)=>{const box=document.createElement('div');box.className='group';box.innerHTML=`<div class="row"><label for="name-${d.id}">Направление ${d.id}</label><input class="angle" type="number" min="0" max="359" value="${d.angle}"></div><input id="name-${d.id}" class="name" type="text" value="${escapeHtml(d.name)}">`;const angle=box.querySelector('.angle'),name=box.querySelector('.name');angle.onchange=()=>{d.angle=norm(parseInt(angle.value,10));angle.value=d.angle;draw()};name.oninput=()=>{d.name=name.value;draw()};dc.appendChild(box)});const cc=id('crossControls');cc.innerHTML='';crosses.forEach(c=>{const row=document.createElement('label');row.className='check';const input=document.createElement('input');input.type='checkbox';input.checked=c.active;input.onchange=()=>{c.active=input.checked;draw()};row.append(input,document.createTextNode(`ПП ${c.dir}`));cc.appendChild(row)})}
function syncAngles(){document.querySelectorAll('#dirControls .angle').forEach((input,i)=>{if(dirs[i])input.value=Math.round(dirs[i].angle)})}
function savePng(){const a=document.createElement('a');a.download='scheme-in-pro.png';a.href=canvas.toDataURL('image/png');a.click()}
function draw(){arrowHits=[];ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);drawRoads();drawMarking();drawCrosswalks();moves.forEach(m=>{if(!m.active)drawArrow(m,false)});moves.forEach(m=>{if(m.active)drawArrow(m,true)});drawNodes()}
function drawRoads(){ctx.fillStyle=CFG.road;ctx.beginPath();ctx.arc(CFG.cx,CFG.cy,CFG.centerRadius,0,Math.PI*2);ctx.fill();dirs.forEach(d=>{const v=vec(d.angle);ctx.beginPath();ctx.moveTo(CFG.cx,CFG.cy);ctx.lineTo(CFG.cx+v.x*CFG.roadLength,CFG.cy+v.y*CFG.roadLength);ctx.strokeStyle=CFG.road;ctx.lineWidth=CFG.roadWidth;ctx.lineCap='butt';ctx.stroke()})}
function drawMarking(){dirs.forEach(d=>{const v=vec(d.angle),p=leftOf(v),start=roadPoint(v,CFG.centerRadius+74),end=roadPoint(v,CFG.roadLength);ctx.strokeStyle=CFG.mark;ctx.lineCap='butt';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(start.x,start.y);ctx.lineTo(end.x,end.y);ctx.stroke();const stop=roadPoint(v,CFG.centerRadius+100);ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(stop.x,stop.y);ctx.lineTo(stop.x+p.x*(CFG.roadWidth/2-8),stop.y+p.y*(CFG.roadWidth/2-8));ctx.stroke()})}
function drawArrow(m,active){const f=dirs.find(d=>d.id===m.from),t=dirs.find(d=>d.id===m.to);if(!f||!t)return;const fv=vec(f.angle),tv=vec(t.angle),turn=turnKind(fv,tv),inRight=rightOf(scale(fv,-1)),outRight=rightOf(tv),inRatio=turn==='left'?0.18:turn==='right'?0.32:0.25,outRatio=turn==='right'?0.32:0.25,inOffset=CFG.roadWidth*inRatio,outOffset=CFG.roadWidth*outRatio,start=add(roadPoint(fv,CFG.roadLength-70),scale(inRight,inOffset)),nearIn=add(roadPoint(fv,CFG.centerRadius-10),scale(inRight,inOffset)),nearOut=add(roadPoint(tv,CFG.centerRadius-10),scale(outRight,outOffset)),end=add(roadPoint(tv,CFG.roadLength-72),scale(outRight,outOffset));const control=centerControl(nearIn,nearOut,turn);const color=active?CFG.red:CFG.soft;ctx.save();ctx.strokeStyle=color;ctx.lineWidth=active?7:5;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(start.x,start.y);ctx.lineTo(nearIn.x,nearIn.y);ctx.quadraticCurveTo(control.x,control.y,nearOut.x,nearOut.y);ctx.lineTo(end.x,end.y);ctx.stroke();const tipDir=unit(sub(end,nearOut));drawHead(end,tipDir,color,active);ctx.restore();arrowHits.push({move:m,points:samplePath(start,nearIn,control,nearOut,end)});if(active)drawMoveBadge(`${m.from}${m.to}`,start,unit(sub(nearIn,start)))}
function centerControl(a,b,turn){if(turn==='straight')return {x:CFG.cx,y:CFG.cy};const mid=unit(add(unit(sub(a,{x:CFG.cx,y:CFG.cy})),unit(sub(b,{x:CFG.cx,y:CFG.cy}))));if(!Number.isFinite(mid.x)||!Number.isFinite(mid.y))return {x:CFG.cx,y:CFG.cy};const pull=turn==='right'?34:8;return {x:CFG.cx+mid.x*pull,y:CFG.cy+mid.y*pull}}
function turnKind(fv,tv){const incoming=scale(fv,-1),cross=incoming.x*tv.y-incoming.y*tv.x,dot=incoming.x*tv.x+incoming.y*tv.y,ang=Math.atan2(cross,dot)*180/Math.PI;if(Math.abs(ang)<25)return 'straight';return ang<0?'left':'right'}
function samplePath(s,a,c,b,e){const pts=[];for(let i=0;i<=8;i++)pts.push(lerp(s,a,i/8));for(let i=0;i<=24;i++)pts.push(quad(a,c,b,i/24));for(let i=0;i<=8;i++)pts.push(lerp(b,e,i/8));return pts}
function drawHead(p,d,color,active){const size=active?20:16,ang=Math.atan2(d.y,d.x),spread=Math.PI/7;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-size*Math.cos(ang-spread),p.y-size*Math.sin(ang-spread));ctx.lineTo(p.x-size*Math.cos(ang+spread),p.y-size*Math.sin(ang+spread));ctx.closePath();ctx.fillStyle=color;ctx.fill()}
function drawMoveBadge(text,start,dir){const pos=add(start,scale(dir,30));ctx.save();ctx.font='bold 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';const w=ctx.measureText(text).width+13;ctx.fillStyle='rgba(255,255,255,.93)';round(pos.x-w/2,pos.y-10,w,20,5,true,false);ctx.fillStyle=CFG.text;ctx.fillText(text,pos.x,pos.y+.5);ctx.restore()}
function drawCrosswalks(){crosses.forEach(c=>{if(!c.active)return;const d=dirs.find(x=>x.id===c.dir);if(!d)return;const v=vec(d.angle),p=leftOf(v),center=roadPoint(v,CFG.centerRadius+55),stripes=14,step=(CFG.roadWidth-18)/stripes;ctx.save();ctx.strokeStyle='#fff';ctx.lineWidth=3;for(let i=0;i<stripes;i++){const o=(i-(stripes-1)/2)*step,s=add(center,scale(p,o));ctx.beginPath();ctx.moveTo(s.x-v.x*10,s.y-v.y*10);ctx.lineTo(s.x+v.x*10,s.y+v.y*10);ctx.stroke()}const label=add(add(center,scale(v,54)),scale(p,-CFG.roadWidth/2-38));badge(`П.${d.id}`,label.x,label.y,18);ctx.restore()})}
function drawNodes(){dirs.forEach(d=>{const v=vec(d.angle),node=roadPoint(v,CFG.roadLength+48);ctx.beginPath();ctx.arc(node.x,node.y,CFG.nodeRadius,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#000';ctx.font='bold 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d.id,node.x,node.y);drawStreet(d,v)})}
function drawStreet(d,v){if(!d.name.trim())return;const p=leftOf(v),base=roadPoint(v,CFG.roadLength/2+78),pt=clampPoint(add(base,scale(p,CFG.roadWidth/2+72)),95),angle=d.angle>90&&d.angle<270?rad(d.angle)+Math.PI:rad(d.angle);ctx.save();ctx.translate(pt.x,pt.y);ctx.rotate(angle);ctx.font='bold 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial';ctx.textAlign='center';ctx.textBaseline='middle';const w=Math.min(ctx.measureText(d.name).width,380)+26,h=42;ctx.fillStyle='rgba(255,255,255,.96)';round(-w/2,-h/2,w,h,7,true,false);ctx.strokeStyle='rgba(0,0,0,.18)';round(-w/2,-h/2,w,h,7,false,true);ctx.fillStyle=CFG.text;fitText(d.name,0,1,w-18,26);ctx.restore()}
function badge(text,x,y,size){ctx.save();ctx.font=`bold ${size}px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial`;ctx.textAlign='center';ctx.textBaseline='middle';const w=ctx.measureText(text).width+18,h=size+12;ctx.fillStyle='rgba(255,255,255,.94)';round(x-w/2,y-h/2,w,h,6,true,false);ctx.strokeStyle='rgba(0,0,0,.18)';round(x-w/2,y-h/2,w,h,6,false,true);ctx.fillStyle='#000';ctx.fillText(text,x,y+.5);ctx.restore()}
function down(e){const p=canvasPoint(e),hit=hitArrow(p);if(hit){hit.move.active=!hit.move.active;draw();e.preventDefault();return}const road=hitRoad(p);if(road){drag={dir:road};canvas.setPointerCapture(e.pointerId);e.preventDefault()}}
function move(e){if(!drag)return;const p=canvasPoint(e);drag.dir.angle=norm(Math.round(Math.atan2(p.y-CFG.cy,p.x-CFG.cx)*180/Math.PI));syncAngles();draw();e.preventDefault()}
function up(e){if(!drag)return;drag=null;try{canvas.releasePointerCapture(e.pointerId)}catch(_){}}
function hitRoad(p){let best=null,score=Infinity;dirs.forEach(d=>{const v=vec(d.angle),node=roadPoint(v,CFG.roadLength+48),edge=distToSegment(p,{x:CFG.cx,y:CFG.cy},node),s=Math.min(edge,dist(p,node));if(s<score){score=s;best=d}});return score<42?best:null}
function hitArrow(p){let best=null,score=Infinity;arrowHits.forEach(h=>h.points.forEach(q=>{const d=dist(p,q);if(d<score){score=d;best=h}}));return score<24?best:null}
function canvasPoint(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
function fitText(text,x,y,max,base){let s=base;while(s>14){ctx.font=`bold ${s}px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial`;if(ctx.measureText(text).width<=max)break;s--}ctx.fillText(text,x,y)}
function roadPoint(v,d){return{x:CFG.cx+v.x*d,y:CFG.cy+v.y*d}}
function vec(deg){return{x:Math.cos(rad(deg)),y:Math.sin(rad(deg))}}
function rightOf(v){return{x:-v.y,y:v.x}}
function leftOf(v){return{x:v.y,y:-v.x}}
function rad(v){return v*Math.PI/180}
function norm(v){return((Number.isFinite(v)?v:0)%360+360)%360}
function add(a,b){return{x:a.x+b.x,y:a.y+b.y}}
function sub(a,b){return{x:a.x-b.x,y:a.y-b.y}}
function scale(v,f){return{x:v.x*f,y:v.y*f}}
function unit(v){const l=Math.hypot(v.x,v.y)||1;return{x:v.x/l,y:v.y/l}}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function clampPoint(p,m){return{x:clamp(p.x,m,canvas.width-m),y:clamp(p.y,m,canvas.height-m)}}
function lerp(a,b,t){return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t}}
function quad(a,b,c,t){const m=1-t;return{x:m*m*a.x+2*m*t*b.x+t*t*c.x,y:m*m*a.y+2*m*t*b.y+t*t*c.y}}
function distToSegment(p,a,b){const ab=sub(b,a),ap=sub(p,a),l2=ab.x*ab.x+ab.y*ab.y||1,t=clamp((ap.x*ab.x+ap.y*ab.y)/l2,0,1);return dist(p,add(a,scale(ab,t)))}
function round(x,y,w,h,r,fill,stroke){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke()}
function escapeHtml(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
</script>
</body>
</html>
